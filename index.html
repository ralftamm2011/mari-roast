<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 Mari Roast AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 class="animated-title">🔥 Mari Roast AI</h1>

  <input id="rizzInput" placeholder="Enter your best rizz">
  <button id="roastBtn" class="btn-glow">Roast</button>

  <div id="roastResult" class="roast-output"></div>

  <h2>💀 Worst Rizzes (Leaderboard)</h2>
  <ul id="leaderboard" class="leaderboard"></ul>

  <!-- Spotify player (optional) -->
  <div class="spotify-player">
    <iframe 
      data-testid="embed-iframe" 
      style="border-radius:12px" 
      src="https://open.spotify.com/embed/track/4Xn2RsLiDUDisOgJ24FigK?utm_source=generator" 
      width="100%" 
      height="80" 
      frameBorder="0" 
      allowfullscreen 
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
      loading="lazy">
    </iframe>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
